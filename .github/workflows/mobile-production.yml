name: iOS → TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-submit:
    name: EAS Build → TestFlight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build IPA via EAS (production)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: eas build --profile production --platform ios --non-interactive --wait

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > /tmp/asc_key.p8
          chmod 600 /tmp/asc_key.p8

      - name: Submit to TestFlight via EAS
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: eas submit --platform ios --profile production --non-interactive --latest

      - name: Clean up API key
        if: always()
        run: rm -f /tmp/asc_key.p8
